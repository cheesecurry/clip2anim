name: Build EXE

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Python関連のインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: バージョン設定
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}" -replace '^v',''

            # Windowsのバージョン形式(1.2.3.4)へ変換
            $parts = $version.Split('.')

            while ($parts.Count -lt 4) {
              $parts += "0"
            }

            $version4 = ($parts[0..3] -join '.')
          }
          else {
            $version = "0.0.0"
            $version4 = "0.0.0.0"
          }

          echo "APP_VERSION=$version" >> $env:GITHUB_ENV
          echo "APP_VERSION_WIN=$version4" >> $env:GITHUB_ENV

      # FFmpegをキャッシュ
      - name: Cache FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ffmpeg
          key: ffmpeg-8.1.2-full

      - name: FFmpegのダウンロード
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-full.7z" -OutFile "ffmpeg.7z" -UseBasicParsing

          7z x ffmpeg.7z -y

          $ffmpegDir = Get-ChildItem -Directory |
            Where-Object Name -like "ffmpeg-*" |
            Select-Object -First 1

          Rename-Item $ffmpegDir.FullName ffmpeg

      - name: 実行ファイル(.exe)の作成
        shell: pwsh
        run: |
          python -m nuitka `
            --standalone `
            --onefile `
            --windows-console-mode=disable `
            --enable-plugin=pyside6 `
            --include-qt-plugins=multimedia `
            --nofollow-import-to=tkinter `
            --remove-output `
            --assume-yes-for-downloads `
            --windows-product-name="Clip2Anim" `
            --windows-file-version=$env:APP_VERSION_WIN `
            --windows-product-version=$env:APP_VERSION_WIN `
            clip2anim.py

      - name: Check Inno Setup
        id: iscc
        shell: pwsh
        run: |
          if (Get-Command iscc -ErrorAction SilentlyContinue) {
            echo "found=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "found=false" >> $env:GITHUB_OUTPUT
          }

      - name: Install Inno Setup
        if: steps.iscc.outputs.found != 'true'
        run: choco install innosetup -y

      - name: インストーラーの作成
        shell: pwsh
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
        run: |
          iscc installer.iss

      - name: 実行ファイルをZIP化
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "clip2anim.exe" `
            -DestinationPath "Output/Clip2Anim-portable.zip" `
            -Force

      - name: Artifactsへアップロード
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: Clip2Anim
          path: |
            Output/*.exe
            Output/*.zip

      - name: GitHub Releaseへアップロード
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Output/*.exe
            Output/*.zip